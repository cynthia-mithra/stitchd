<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
    <meta name="theme-color" content="#FF1493"/>
    <meta name="description" content="Stitch'd — the UK marketplace for pre-loved South Asian fashion. Buy & resell sarees, lehengas, sherwanis and more, with real measurements and buyer protection."/>
    <!-- Warm up the connections used for the first paint: listing images (Supabase
         storage) and the web fonts — shaves latency off the first image/font fetch. -->
    <link rel="preconnect" href="https://zhstooqgkyuzxseylsbk.supabase.co" crossorigin/>
    <link rel="dns-prefetch" href="https://zhstooqgkyuzxseylsbk.supabase.co"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg"/>
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png"/>
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="Stitch'd"/>

    <!-- Open Graph (Facebook, WhatsApp, iMessage, LinkedIn…) -->
    <meta property="og:type" content="website"/>
    <meta property="og:site_name" content="Stitch'd"/>
    <meta property="og:title" content="Stitch'd — Pre-loved South Asian Fashion"/>
    <meta property="og:description" content="Buy & resell South Asian fashion — sarees, lehengas, sherwanis & more. Real measurements, buyer protection, UK delivery."/>
    <meta property="og:url" content="https://stitchd.fit/"/>
    <meta property="og:image" content="https://stitchd.fit/og-image.png"/>
    <meta property="og:image:width" content="1200"/>
    <meta property="og:image:height" content="630"/>

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="Stitch'd — Pre-loved South Asian Fashion"/>
    <meta name="twitter:description" content="Buy & resell South Asian fashion — sarees, lehengas, sherwanis & more."/>
    <meta name="twitter:image" content="https://stitchd.fit/og-image.png"/>

    <title>Stitch'd — Pre-loved South Asian Fashion</title>
  </head>
  <body>
    <noscript>You need JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
