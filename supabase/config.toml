# Supabase project config.
# `project_id` is the project ref these functions deploy to. After `supabase
# link --project-ref zhstooqgkyuzxseylsbk`, the CLI reads the [functions.*]
# blocks below so each deploy applies the correct JWT setting automatically.
project_id = "zhstooqgkyuzxseylsbk"

# Stripe calls this endpoint with a Stripe signature, NOT a Supabase JWT, so JWT
# verification must be OFF or every webhook delivery returns 401. (Auth here is
# the Stripe signature check inside the function.)
[functions.stripe-webhook]
verify_jwt = false

# Called from the browser before the user is necessarily signed in; it does its
# own price lookups server-side, so it doesn't rely on the caller's JWT.
[functions.stripe-checkout]
verify_jwt = false

# Called from the /order-success page with just the Stripe session_id.
[functions.verify-session]
verify_jwt = false

# Phase 12 — transactional email sender. Called from the browser data layer
# (db.js fireEmail) and from other Edge Functions, neither of which presents a
# Supabase JWT, so verification must be OFF. The function does its own auth: the
# raw {to,subject,html} path requires the service-role bearer; the templated path
# only ever sends predefined brand templates to server-resolved recipients.
[functions.send-email]
verify_jwt = false

# Phase 12 — saved-search alert sweep. Invoked by the pg_cron schedule (every 6h)
# and fire-and-forget from the browser data layer right after a listing is
# published — neither presents a Supabase JWT, so verification must be OFF. It
# only ever sends predefined brand templates to server-resolved recipients and
# reads/writes via the service role.
[functions.saved-search-alerts]
verify_jwt = false

# Phase 13 — promoted listings. create-promotion-session is called from the
# browser (seller dashboard) and verifies listing ownership server-side via the
# service role; expire-promotions is invoked by the hourly pg_cron schedule with
# the service-role bearer. Neither presents a Supabase user JWT, so verification
# must be OFF.
[functions.create-promotion-session]
verify_jwt = false

[functions.expire-promotions]
verify_jwt = false

# Phase 14 — seller responds to offers. expire-offers is invoked by the hourly
# pg_cron schedule (phase14 offers-response migration) with the service-role
# bearer to expire pending offers past their 48-hour deadline and notify both
# parties. send-email is reused for the accept/decline emails. expire-offers
# presents no Supabase user JWT, so verification must be OFF.
[functions.expire-offers]
verify_jwt = false

# Phase 14 — offer checkout. create-offer-checkout is called from the browser
# (the /offers COMPLETE PURCHASE button, via the same-origin Vercel proxy) and
# re-verifies the accepted offer server-side via the service role before building
# the Stripe Checkout Session. It doesn't rely on the caller's JWT, so
# verification must be OFF. The payment result arrives on stripe-webhook
# (metadata.type='offer').
[functions.create-offer-checkout]
verify_jwt = false

# Phase 15 — alteration booking checkout. create-alteration-checkout is called
# from the browser (the /alterations ACCEPT AND PAY button, via the same-origin
# Vercel proxy) and re-verifies the quoted request server-side via the service
# role before building the Stripe Checkout Session for the full quote. It doesn't
# rely on the caller's JWT, so verification must be OFF. The payment result
# arrives on stripe-webhook (metadata.type='alteration').
[functions.create-alteration-checkout]
verify_jwt = false
